<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Money Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
        .login-box { max-width:400px; width:100%; text-align:center; }
        .admin-badge {
            width:72px; height:72px; border-radius:18px; background:var(--gradient-primary, linear-gradient(135deg,#6366f1,#8b5cf6));
            display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:1.8rem; color:#fff;
        }
        .auth-label { display:block; font-size:0.78rem; color:var(--text-secondary); margin-bottom:0.35rem; font-weight:500; text-align:left; }
        .auth-error { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35); color:#fca5a5;
                      border-radius:10px; padding:0.6rem 0.8rem; font-size:0.82rem; text-align:left; }
        .auth-error.d-none { display:none; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-box glass-card animate-fade-in-up">
            <div class="admin-badge"><i class="fa-solid fa-shield-halved"></i></div>
            <h1 class="g-text" style="font-size:1.8rem; margin-bottom:0.25rem;">Admin Login</h1>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.75rem;">Money Master control panel</p>

            <form id="adminForm" style="display:flex; flex-direction:column; gap:0.9rem; text-align:left;">
                <div>
                    <label class="auth-label">Admin email</label>
                    <input id="email" type="email" class="input-glass" placeholder="admin@college.edu" autocomplete="email" required>
                </div>
                <div>
                    <label class="auth-label">Password</label>
                    <input id="password" type="password" class="input-glass" placeholder="••••••••" autocomplete="current-password" required>
                </div>

                <div id="loginError" class="auth-error d-none"></div>

                <button id="submitBtn" type="submit" class="btn-glow" style="width:100%; justify-content:center; margin-top:0.25rem;">
                    Log in to admin
                </button>

                <div id="loader" style="display:none; margin-top:0.5rem;">
                    <div class="spinner-glass" style="margin:0 auto;"></div>
                </div>
            </form>

            <p style="color:var(--text-muted); font-size:0.8rem; margin-top:1.25rem;">
                Not an admin? <a href="/" style="color:var(--accent-primary); font-weight:600;">Player login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/admin-login.js"></script>
</body>
</html>
